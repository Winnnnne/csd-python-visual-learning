name: Import source archive

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/import-source.yml"

permissions:
  contents: write

jobs:
  import-source:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Extract source and remove archive
        shell: bash
        run: |
          unzip -o csd-source-upload-c170100b2bed4e53aead5de082abe0d5.zip || [ $? -eq 1 ]
          rm csd-source-upload-c170100b2bed4e53aead5de082abe0d5.zip
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add CSD learning website source"
          git push
